version: '3'

# SlideVoice Studio CLI (Rust) — task runner.
#
# Headless video production: PDF/images → Gemini notes → Gemini TTS →
# FFmpeg → narrated MP4. Mirrors the export pipeline of ../fl-svs and
# ../swift-svs without any UI in the loop.

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Rust code
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: Verify formatting without rewriting
    cmds:
      - cargo fmt --all -- --check

  lint:
    desc: Static analysis with Clippy (warnings denied)
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  test:
    desc: Run unit and integration tests
    cmds:
      - cargo test --all-features

  build:
    desc: Release build of the `svs` binary
    cmds:
      - cargo build --release

  build:debug:
    desc: Debug build of the `svs` binary
    cmds:
      - cargo build

  run:
    desc: Run the CLI in debug mode (forward args after `--`)
    cmds:
      - cargo run --quiet -- {{.CLI_ARGS}}

  install:
    desc: Build release and install `svs` binary into ~/bin/
    cmds:
      - cargo build --release
      - cp target/release/svs ~/bin/svs

  check:all:
    desc: Format, lint, and test in one pass
    cmds:
      - task: fmt
      - task: lint
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean

  loc:
    desc: Count lines of code with tokei
    cmds:
      - tokei --exclude target

  # ─── Versioning ─────────────────────────────────────────────────────

  version:patch:
    desc: Bump patch version (0.1.0 → 0.1.1)
    cmds:
      - ./scripts/version-bump.sh patch

  version:minor:
    desc: Bump minor version (0.1.0 → 0.2.0)
    cmds:
      - ./scripts/version-bump.sh minor

  version:major:
    desc: Bump major version (0.1.0 → 1.0.0)
    cmds:
      - ./scripts/version-bump.sh major

  version:tag:
    desc: Sync VERSION to Cargo.toml, commit, and create git tag
    cmds:
      - ./scripts/version-tag.sh

  # ─── Production Pipeline (thin wrappers around scripts/) ────────────

  render:
    desc: "Render deck to MP4 — forward all args to scripts/render.sh"
    cmds:
      - ./scripts/render.sh {{.CLI_ARGS}}

  render:fast:
    desc: "Quick render — no transitions, lower DPI"
    cmds:
      - ./scripts/render-fast.sh {{.CLI_ARGS}}
